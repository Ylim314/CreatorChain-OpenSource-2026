    <!-- 早期错误处理脚本 - 过滤浏览器扩展错误 -->
    <script>
      (function() {
        // 保存原始的console方法
        const originalError = console.error;
        const originalWarn = console.warn;

        // 检查是否为扩展错误
        function isExtensionError(message) {
          const msg = String(message || '');
          return msg.includes('A listener indicated an asynchronous response') ||
                 msg.includes('message channel closed') ||
                 msg.includes('Receiving end does not exist') ||
                 msg.includes('v[w] is not a function') ||
                 msg.includes('is not a function') ||
                 msg.includes('main.') ||
                 msg.includes('chunk.') ||
                 msg.includes('a.onload') ||
                 /^[a-z]\[[a-z]\]/.test(msg);
        }

        // 过滤console.error
        console.error = function(...args) {
          if (!isExtensionError(args[0])) {
            originalError.apply(console, args);
          }
        };

        // 过滤console.warn
        console.warn = function(...args) {
          if (!isExtensionError(args[0])) {
            originalWarn.apply(console, args);
          }
        };

        // 过滤未捕获的Promise错误
        window.addEventListener('unhandledrejection', function(event) {
          if (isExtensionError(event.reason)) {
            event.preventDefault();
          }
        });

        // 过滤脚本错误
        window.addEventListener('error', function(event) {
          if (isExtensionError(event.message) ||
              (event.filename && (event.filename.includes('extension') ||
                                  event.filename.includes('main.') ||
                                  event.filename.includes('chunk.')))) {
            event.preventDefault();
          }
        });
      })();
    </script>
