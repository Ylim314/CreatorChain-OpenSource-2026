<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg-deep" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#050510;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#150a25;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="cyber-flux" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00fff2;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#bc13fe;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00fff2;stop-opacity:1" />
        </linearGradient>
        <filter id="hyper-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2" />
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur6" />
            <feComposite in="SourceGraphic" in2="blur2" operator="over" result="comp1" />
            <feComposite in="comp1" in2="blur6" operator="over" />
        </filter>
    </defs>
    <rect width="500" height="500" fill="url(#bg-deep)" />
    <path d="M0,250 L500,250 M250,0 L250,500" stroke="#bc13fe" stroke-width="0.5" opacity="0.2" />
    <circle cx="250" cy="250" r="180" stroke="#00fff2" stroke-width="0.5" opacity="0.1" stroke-dasharray="10, 5" />
    <g transform="translate(250, 250)" filter="url(#hyper-glow)">
        <g stroke="url(#cyber-flux)" stroke-width="4" fill="none" stroke-linecap="round">
            <path d="M-80,-140 L80,-140 L120,-70" opacity="0.8" />
            <path d="M120,70 L80,140 L20,140" opacity="0.8" />
            <path d="M-20,140 L-80,140 L-120,70" opacity="0.8" />
            <path d="M-120,-70 L-80,-140" opacity="0.4" />
            <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="20s" repeatCount="indefinite" />
        </g>
        <path d="M0,-100 L86.6,-50 L86.6,50 L0,100 L-86.6,50 L-86.6,-50 Z" stroke="#bc13fe" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="2,4"/>
        <g>
            <path d="M0,-40 L25,-15 L0,40 L-25,-15 Z" fill="#050510" stroke="#00fff2" stroke-width="3">
                <animate attributeName="stroke-width" values="3;6;3" dur="2s" repeatCount="indefinite"/>
                <animate attributeName="stroke" values="#00fff2;#ffffff;#00fff2" dur="2s" repeatCount="indefinite"/>
            </path>
            <circle cx="0" cy="-5" r="8" fill="#bc13fe">
                <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite"/>
            </circle>
            <rect x="-35" y="-10" width="4" height="4" fill="#00fff2" opacity="0.8">
                <animate attributeName="y" values="-10;-15;-10" dur="3s" repeatCount="indefinite"/>
            </rect>
            <rect x="31" y="20" width="4" height="4" fill="#00fff2" opacity="0.8">
                <animate attributeName="y" values="20;25;20" dur="2.5s" repeatCount="indefinite"/>
            </rect>
        </g>
        <g stroke="#00fff2" stroke-width="1" opacity="0.6">
            <line x1="0" y1="-40" x2="0" y2="-100" />
            <line x1="0" y1="40" x2="0" y2="100" />
            <line x1="-25" y1="-15" x2="-86.6" y2="-50" />
            <line x1="25" y1="-15" x2="86.6" y2="-50" />
        </g>
    </g>
</svg>