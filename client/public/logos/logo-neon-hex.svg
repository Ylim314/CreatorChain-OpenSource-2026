<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a0b2e;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="neon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#6a00ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff00d4;stop-opacity:1" />
        </linearGradient>
        <radialGradient id="core-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
            <stop offset="40%" style="stop-color:#00f2ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#6a00ff;stop-opacity:0" />
        </radialGradient>
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur5" />
            <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur10" />
            <feMerge>
                <feMergeNode in="blur5" />
                <feMergeNode in="blur10" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
            <path d="M0,2 L4,2" stroke="#000000" stroke-width="1" opacity="0.2"/>
        </pattern>
    </defs>
    <rect width="500" height="500" fill="url(#bg-gradient)" />
    <rect width="500" height="500" fill="url(#scanlines)" />
    <g filter="url(#neon-glow)" transform="translate(250, 250)">
        <path d="M0,-180 L155.88,-90 L155.88,90 L0,180 L-155.88,90 L-155.88,-90 Z" fill="none" stroke="url(#neon-gradient)" stroke-width="6" stroke-linejoin="round" opacity="0.7">
            <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
        </path>
        <path d="M0,-120 L103.92,-60 L103.92,60 L0,120 L-103.92,60 L-103.92,-60 Z" fill="none" stroke="url(#neon-gradient)" stroke-width="3" opacity="0.5" />
        <g stroke="url(#neon-gradient)" stroke-width="2" stroke-linecap="round">
            <line x1="0" y1="-120" x2="0" y2="-60" />
            <line x1="103.92" y1="-60" x2="51.96" y2="-30" />
            <line x1="103.92" y1="60" x2="51.96" y2="30" />
            <line x1="0" y1="120" x2="0" y2="60" />
            <line x1="-103.92" y1="60" x2="-51.96" y2="30" />
            <line x1="-103.92" y1="-60" x2="-51.96" y2="-30" />
            <line x1="-51.96" y1="-30" x2="51.96" y2="30" opacity="0.6"/>
            <line x1="51.96" y1="-30" x2="-51.96" y2="30" opacity="0.6"/>
        </g>
        <g>
            <circle cx="0" cy="0" r="40" fill="url(#core-glow)" opacity="0.6">
                <animate attributeName="r" values="35;45;35" dur="2s" repeatCount="indefinite"/>
            </circle>
            <path d="M0,-30 L25.98,-15 L25.98,15 L0,30 L-25.98,15 L-25.98,-15 Z" fill="#1a0b2e" stroke="#00f2ff" stroke-width="3"/>
            <path d="M-10,0 L-3,7 L12,-8" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <animate attributeName="opacity" values="1;0.8;1;0.2;1" dur="0.5s" repeatCount="indefinite" calcMode="discrete"/>
            </path>
        </g>
        <g fill="#00f2ff">
            <circle cx="0" cy="-180" r="4" />
            <circle cx="155.88" cy="-90" r="4" />
            <circle cx="155.88" cy="90" r="4" />
            <circle cx="0" cy="180" r="4" />
            <circle cx="-155.88" cy="90" r="4" />
            <circle cx="-155.88" cy="-90" r="4" />
        </g>
    </g>
</svg>

