<!DOCTYPE html>
<html>
<head>
    <title>清除重复作品</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px;
            background: #1a1a2e;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
        }
        button { 
            padding: 12px 24px; 
            margin: 10px 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-primary {
            background: #3498db;
            color: white;
        }
        .creation { 
            border: 1px solid #0f3460; 
            margin: 10px 0; 
            padding: 15px;
            background: #0f3460;
            border-radius: 5px;
        }
        img { 
            max-width: 200px; 
            max-height: 150px;
            border-radius: 5px;
        }
        pre { 
            background: #0a1929; 
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .duplicate {
            background: #5a1a1a;
            border: 2px solid #ff4444;
        }
        h3 {
            color: #4ECDC4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 清除重复作品工具</h1>
        <p>这个工具可以帮助你查看和清除 localStorage 中的重复作品数据</p>
        
        <div style="margin: 20px 0;">
            <button class="btn-primary" onclick="showCreations()">📋 显示所有作品</button>
            <button class="btn-danger" onclick="removeDuplicates()">🧹 智能去重</button>
            <button class="btn-danger" onclick="clearAll()">🗑️ 清空所有</button>
        </div>

        <div id="output"></div>
    </div>

    <script>
        function showCreations() {
            const stored = localStorage.getItem('userCreations');
            const output = document.getElementById('output');

            if (stored) {
                try {
                    const creations = JSON.parse(stored);
                    let html = '<h3>当前作品列表 (' + creations.length + ' 个):</h3>';
                    
                    creations.forEach((creation, index) => {
                        html += '<div class="creation">';
                        html += '<strong>作品 #' + (index + 1) + '</strong><br>';
                        html += '<strong>标题:</strong> ' + (creation.title || '无标题') + '<br>';
                        html += '<strong>ID:</strong> ' + (creation.id || '无') + '<br>';
                        html += '<strong>Token ID:</strong> ' + (creation.token_id || '无') + '<br>';
                        html += '<strong>类型:</strong> ' + (creation.creationType || creation.category || '未知') + '<br>';
                        
                        if (creation.image || creation.image_url) {
                            html += '<img src="' + (creation.image || creation.image_url) + '" onerror="this.style.display=\'none\'"><br>';
                        }
                        
                        html += '<details><summary>查看详细数据</summary><pre>' + 
                                JSON.stringify(creation, null, 2) + '</pre></details>';
                        html += '</div>';
                    });
                    
                    output.innerHTML = html;
                } catch (e) {
                    output.innerHTML = '<div class="creation"><strong>错误:</strong> ' + e.message + '</div>';
                }
            } else {
                output.innerHTML = '<h3>没有找到作品数据</h3>';
            }
        }

        function removeDuplicates() {
            const stored = localStorage.getItem('userCreations');
            if (!stored) {
                alert('没有找到作品数据');
                return;
            }

            try {
                const creations = JSON.parse(stored);
                const beforeCount = creations.length;
                
                // 多维度去重
                const dedupMap = new Map();
                const usedKeys = new Set();
                
                creations.forEach((creation, index) => {
                    const keys = [];
                    
                    // 生成多个可能的唯一标识
                    const id = creation.id;
                    const tokenId = creation.token_id || creation.TokenID;
                    const title = (creation.title || '').trim().toLowerCase();
                    const imageUrl = creation.image || creation.image_url || '';
                    const hash = creation.fileHash || creation.content_hash || creation.hash || '';
                    
                    if (id) keys.push(`id_${id}`);
                    if (tokenId) keys.push(`token_${tokenId}`);
                    if (title && imageUrl) keys.push(`title_img_${title}_${imageUrl}`);
                    if (title && hash) keys.push(`title_hash_${title}_${hash}`);
                    if (title && title !== '未命名作品' && title.length > 2) keys.push(`title_${title}`);
                    
                    // 检查是否已存在
                    const isDuplicate = keys.some(key => usedKeys.has(key));
                    
                    if (!isDuplicate) {
                        const primaryKey = keys[0] || `unique_${index}`;
                        dedupMap.set(primaryKey, creation);
                        keys.forEach(key => usedKeys.add(key));
                    } else {
                        console.log('发现重复:', creation.title, keys);
                    }
                });
                
                const uniqueCreations = Array.from(dedupMap.values());
                const afterCount = uniqueCreations.length;
                
                if (beforeCount === afterCount) {
                    alert('没有发现重复作品！');
                    return;
                }
                
                if (confirm(`发现 ${beforeCount - afterCount} 个重复作品\n\n去重前: ${beforeCount} 个\n去重后: ${afterCount} 个\n\n确认要删除重复作品吗？`)) {
                    localStorage.setItem('userCreations', JSON.stringify(uniqueCreations));
                    alert('✅ 去重成功！\n\n已删除 ' + (beforeCount - afterCount) + ' 个重复作品\n请刷新页面查看效果');
                    showCreations();
                }
            } catch (e) {
                alert('去重失败: ' + e.message);
            }
        }

        function clearAll() {
            if (confirm('⚠️ 确认要清空所有本地作品数据吗？\n\n注意：这只会清除本地缓存，不会影响区块链和数据库中的数据。')) {
                localStorage.removeItem('userCreations');
                alert('✅ 已清空所有本地作品数据\n请刷新页面重新从区块链和后端加载');
                document.getElementById('output').innerHTML = '<h3>已清空</h3>';
            }
        }

        // 页面加载时自动显示
        showCreations();
    </script>
</body>
</html>
