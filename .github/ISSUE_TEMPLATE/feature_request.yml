name: Feature request
description: Suggest an idea or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: As a user/developer, I want ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your proposed approach.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or trade-offs.
  - type: checkboxes
    id: areas
    attributes:
      label: Impacted areas
      options:
        - label: Backend
        - label: Client
        - label: Contracts
        - label: Docs
