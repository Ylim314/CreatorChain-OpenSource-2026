name: Bug report
description: Report a reproducible bug
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps so others can reproduce it.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Run ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste logs, stack traces, or screenshots.
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Node, Go, and relevant tool versions.
      placeholder: Windows 11, Node 20, Go 1.24.7, Hardhat 2.26
